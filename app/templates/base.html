<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Lextor{% endblock %} — Traducción y Lectura Bilingüe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          },
          colors: {
            ink: {
              50: '#f7f7f8',
              100: '#ededf0',
              200: '#d6d6dc',
              300: '#b0b0bc',
              400: '#84849a',
              500: '#65657e',
              600: '#515168',
              700: '#424257',
              800: '#393949',
              900: '#161622',
              950: '#0d0d16',
            }
          }
        }
      }
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="bg-white text-ink-900 font-sans antialiased">
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
