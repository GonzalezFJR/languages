{% extends "base.html" %}

{% block title %}Log in — Lextor{% endblock %}

{% block body %}
<div class="min-h-screen flex flex-col bg-ink-50">

  <!-- Nav -->
  <nav class="bg-white border-b border-ink-100">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <span class="text-xl font-bold tracking-tight text-ink-900">Lextor</span>
      </a>
      <a href="/home" class="text-sm text-ink-500 hover:text-ink-700 transition-colors">
        Explorar sin cuenta →
      </a>
    </div>
  </nav>

  <!-- Login form -->
  <div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-xl border border-ink-100 w-full max-w-sm p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-ink-900 mb-2">Iniciar sesión</h1>
        <p class="text-sm text-ink-400">Accede a tu espacio personal de proyectos.</p>
      </div>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 mb-6">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-4">
          <label class="block text-sm font-medium text-ink-700 mb-1.5">Usuario</label>
          <input name="username" type="text" required autocomplete="username"
            class="w-full border border-ink-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900/20 focus:border-ink-400"
            placeholder="Tu nombre de usuario" />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-ink-700 mb-1.5">Contraseña</label>
          <input name="password" type="password" required autocomplete="current-password"
            class="w-full border border-ink-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900/20 focus:border-ink-400"
            placeholder="••••••••" />
        </div>
        <button type="submit"
          class="w-full px-4 py-2.5 bg-ink-900 text-white rounded-xl text-sm font-medium hover:bg-ink-700 transition-colors">
          Entrar
        </button>
      </form>
    </div>
  </div>

</div>
{% endblock %}
